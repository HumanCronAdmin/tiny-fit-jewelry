<section style="padding-top:100px;">
 <div class="container narrow">
 <h1 style="font-size:2rem;margin-bottom:8px;">My Saved Brands</h1>
 <p style="color:#78716C;margin-bottom:24px;">Brands you saved with the heart button. Stored in your browser — no account needed.</p>
 <div id="wishlist-content"></div>
 </div>
</section>

<script>
(function() {
 var list = [];
 try { list = JSON.parse(localStorage.getItem('tinyfit_wishlist')) || []; } catch(e) {}
 var container = document.getElementById('wishlist-content');

 if (list.length === 0) {
 container.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#78716C;">'
 + '<p style="font-size:1.2rem;margin-bottom:12px;">No saved brands yet.</p>'
 + '<p>Visit any <a href="database.html" style="color:#B76E79;font-weight:600;">brand page</a> and click the heart button to save it here.</p>'
 + '</div>';
 return;
 }

 fetch('data/brands.json').then(function(r){return r.json()}).then(function(brands) {
 var saved = brands.filter(function(b) { return list.indexOf(b.brand) !== -1; });
 if (saved.length === 0) { container.innerHTML = '<p>No matching brands found.</p>'; return; }

 var html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;">';
 saved.forEach(function(b) {
 var s = b.brand.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
 var ring = b.min_ring_size_us ? 'Size ' + b.min_ring_size_us : '-';
 var bracelet = b.min_bracelet_cm ? b.min_bracelet_cm + 'cm' : '-';
 html += '<a href="brands/' + s + '.html" style="text-decoration:none;color:inherit;">'
 + '<div style="background:#fff;border:2px solid #E7E5E4;border-radius:12px;padding:20px;transition:border-color 0.2s;"'
 + ' onmouseover="this.style.borderColor=\'#B76E79\'" onmouseout="this.style.borderColor=\'#E7E5E4\'">'
 + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">'
 + '<h3 style="margin:0;font-size:1.1rem;">' + b.brand + '</h3>'
 + '<span style="color:#B76E79;font-size:1.2rem;">&#9829;</span></div>'
 + '<p style="color:#78716C;font-size:0.85rem;margin:0;">' + b.country + ' | Ring: ' + ring + ' | Bracelet: ' + bracelet + ' | $' + (b.price_min||'?') + '-$' + (b.price_max||'?') + '</p>'
 + '</div></a>';
 });
 html += '</div>';
 html += '<p style="text-align:center;margin-top:24px;"><a href="compare.html" style="color:#B76E79;font-weight:600;">Compare your saved brands &rarr;</a></p>';
 container.innerHTML = html;
 });
})();
</script>
